<svg viewBox="0 0 120 120" width="120" height="120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="La Palapa Cabo Pulmo — ícono">
  <title>La Palapa Cabo Pulmo (ícono)</title>

  <!-- Fondo circular opcional — comentar si se usa sobre fondo propio -->
  <!-- <circle cx="60" cy="60" r="60" fill="#0D3B4E"/> -->

  <g transform="translate(10, 8)">
    <!-- Sol parcial -->
    <path d="M32,42 A20,20 0 0,1 68,42" fill="none" stroke="#D4614A" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="50" y1="18" x2="50" y2="12" stroke="#D4614A" stroke-width="2"   stroke-linecap="round"/>
    <line x1="65" y1="24" x2="69" y2="19" stroke="#D4614A" stroke-width="2"   stroke-linecap="round"/>
    <line x1="35" y1="24" x2="31" y2="19" stroke="#D4614A" stroke-width="2"   stroke-linecap="round"/>
    <line x1="73" y1="38" x2="79" y2="35" stroke="#D4614A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="27" y1="38" x2="21" y2="35" stroke="#D4614A" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Techo palapa -->
    <path d="M10,62 Q26,30 50,23 Q74,30 90,62 Z" fill="#2A8FA0"/>
    <!-- Líneas de hoja -->
    <line x1="50" y1="23" x2="18"  y2="59" stroke="rgba(13,59,78,0.22)" stroke-width="1.2"/>
    <line x1="50" y1="23" x2="28"  y2="61" stroke="rgba(13,59,78,0.22)" stroke-width="1.2"/>
    <line x1="50" y1="23" x2="38"  y2="62" stroke="rgba(13,59,78,0.22)" stroke-width="1.2"/>
    <line x1="50" y1="23" x2="50"  y2="62" stroke="rgba(13,59,78,0.22)" stroke-width="1.2"/>
    <line x1="50" y1="23" x2="62"  y2="62" stroke="rgba(13,59,78,0.22)" stroke-width="1.2"/>
    <line x1="50" y1="23" x2="72"  y2="61" stroke="rgba(13,59,78,0.22)" stroke-width="1.2"/>
    <line x1="50" y1="23" x2="82"  y2="59" stroke="rgba(13,59,78,0.22)" stroke-width="1.2"/>
    <!-- Flecos ondulados -->
    <path d="M10,62 Q16,68 22,62 Q28,68 34,62 Q40,68 46,62 Q52,68 58,62 Q64,68 70,62 Q76,68 82,62 Q86,65 90,62"
          fill="none" stroke="#C2E6EC" stroke-width="2" stroke-linecap="round"/>
    <!-- Postes -->
    <line x1="28" y1="62" x2="28" y2="92" stroke="#C2E6EC" stroke-width="3" stroke-linecap="round"/>
    <line x1="72" y1="62" x2="72" y2="92" stroke="#C2E6EC" stroke-width="3" stroke-linecap="round"/>
    <!-- Horizonte -->
    <line x1="4"  y1="92" x2="96" y2="92" stroke="#2A8FA0" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <!-- Olas -->
    <path d="M4,98 Q14,93 24,98 Q34,103 44,98"  fill="none" stroke="#2A8FA0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M56,98 Q66,93 76,98 Q86,103 96,98" fill="none" stroke="#2A8FA0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
