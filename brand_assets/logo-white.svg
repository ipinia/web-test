<svg viewBox="0 0 320 130" width="320" height="130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="La Palapa Cabo Pulmo — versión blanca">
  <title>La Palapa Cabo Pulmo (white)</title>

  <!-- ICON: palapa — versión blanca para fondos oscuros -->
  <g transform="translate(18, 8)">
    <!-- Sol parcial -->
    <path d="M56,38 A18,18 0 0,1 92,38" fill="none" stroke="#D4614A" stroke-width="2" stroke-linecap="round"/>
    <line x1="74" y1="16" x2="74" y2="11" stroke="#D4614A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="88" y1="21" x2="92" y2="17" stroke="#D4614A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="60" y1="21" x2="56" y2="17" stroke="#D4614A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="96" y1="34" x2="101" y2="32" stroke="#D4614A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="52" y1="34" x2="47"  y2="32" stroke="#D4614A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Techo palapa — blanco -->
    <path d="M36,55 Q52,28 74,22 Q96,28 112,55 Z" fill="#FAFCFC"/>
    <!-- Líneas de hoja -->
    <line x1="74" y1="22" x2="44"  y2="52" stroke="rgba(13,59,78,0.18)" stroke-width="1"/>
    <line x1="74" y1="22" x2="54"  y2="54" stroke="rgba(13,59,78,0.18)" stroke-width="1"/>
    <line x1="74" y1="22" x2="64"  y2="55" stroke="rgba(13,59,78,0.18)" stroke-width="1"/>
    <line x1="74" y1="22" x2="74"  y2="55" stroke="rgba(13,59,78,0.18)" stroke-width="1"/>
    <line x1="74" y1="22" x2="84"  y2="55" stroke="rgba(13,59,78,0.18)" stroke-width="1"/>
    <line x1="74" y1="22" x2="94"  y2="54" stroke="rgba(13,59,78,0.18)" stroke-width="1"/>
    <line x1="74" y1="22" x2="104" y2="52" stroke="rgba(13,59,78,0.18)" stroke-width="1"/>
    <!-- Flecos -->
    <path d="M36,55 Q42,60 48,55 Q54,60 60,55 Q66,60 72,55 Q78,60 84,55 Q90,60 96,55 Q102,60 108,55 Q110,57 112,55"
          fill="none" stroke="rgba(250,252,252,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Postes -->
    <line x1="52" y1="55" x2="52" y2="82" stroke="#FAFCFC" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="96" y1="55" x2="96" y2="82" stroke="#FAFCFC" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Horizonte -->
    <line x1="28" y1="82" x2="120" y2="82" stroke="rgba(250,252,252,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Olas -->
    <path d="M28,87 Q36,83 44,87 Q52,91 60,87" fill="none" stroke="rgba(250,252,252,0.4)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M88,87 Q96,83 104,87 Q112,91 120,87" fill="none" stroke="rgba(250,252,252,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- WORDMARK — blanco -->
  <text x="188" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic"
        fill="#FAFCFC" font-weight="400" text-anchor="middle">La Palapa</text>
  <text x="188" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic"
        fill="#C2E6EC" font-weight="400" text-anchor="middle">Cabo Pulmo</text>
  <line x1="145" y1="74" x2="231" y2="74" stroke="rgba(250,252,252,0.15)" stroke-width="0.8"/>
  <text x="188" y="84" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="rgba(194,230,236,0.6)"
        letter-spacing="2.5" text-anchor="middle" font-weight="500">BUCEO · SNORKEL · BCS</text>
</svg>
